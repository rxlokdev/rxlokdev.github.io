<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexService</title>
    <style>
        /* Grundlegendes Design im Darkmode */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dunkler Hintergrund */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Bereich für die Positionierung oben rechts */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-end; /* Schiebt den Inhalt nach rechts */
            box-sizing: border-box;
        }

        /* NexService Branding in Orange */
        .brand {
            color: #ff8c00; /* Kräftiges Orange */
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Hauptbereich für späteren Content */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .placeholder {
            color: #444;
            font-size: 1.2rem;
            border: 2px dashed #333;
            padding: 40px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">NexService</div>
    </header>

    <main>
        <div class="placeholder">
            Hier entsteht NexService...
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexService</title>
    <style>
        /* Base design in Dark Mode */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header Layout */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            background-color: rgba(18, 18, 18, 0.95);
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .nav-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #ff8c00;
        }

        .discord-link {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.3s ease;
        }

        .brand {
            color: #ff8c00;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main content area */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* Motion Blur Animation for sections */
        @keyframes motionBlurIn {
            0% { filter: blur(10px); transform: scale(0.95); opacity: 0; }
            100% { filter: blur(0); transform: scale(1); opacity: 1; }
        }

        .content-section { display: none; }
        .content-section.active { display: block; animation: motionBlurIn 0.4s ease-out; }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Card Style */
        .card {
            background-color: #1e1e1e;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .item-name {
            display: block;
            padding: 15px;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: #ff8c00;
        }

        .item-name:hover { color: #ff8c00; }

        .download-btn {
            display: block;
            background-color: #ff8c00;
            color: #121212;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
            border-radius: 4px;
        }

        /* MODAL STYLE */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #1e1e1e;
            margin: 15% auto;
            padding: 30px;
            border: 1px solid #ff8c00;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
            text-align: left;
            animation: motionBlurIn 0.3s ease-out;
        }

        .close {
            color: #888;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover { color: #fff; }

        .specs-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .specs-list li {
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        .specs-list b { color: #ff8c00; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="https://discord.gg/C2r3TptZxE" class="discord-link" target="_blank">Discord</a>
            <button class="nav-btn active" onclick="showSection('games')">Games</button>
            <button class="nav-btn" onclick="showSection('apps')">Apps</button>
        </div>
        <div class="brand">NexService</div>
    </header>

    <main>
        <div class="container">
            
            <div id="games" class="content-section active">
                <h1>Game Downloads</h1>
                <div class="button-grid">
                    <div class="card">
                        <span class="item-name" onclick="openSpecs('Minecraft', 'Win 7+', 'Intel Core i3', '4GB', 'Intel HD 4000')">Minecraft (TLauncher)</span>
                        <a href="https://dl1.tlauncher.org/f.php?f=files%2FTLauncher-Installer-1.9.5.5.exe" class="download-btn">Download</a>
                    </div>
                    <div class="card">
                        <span class="item-name" onclick="openSpecs('Age of Conflict', 'Win 7+', '2.0 GHz Dual Core', '2GB', 'Integrated Graphics')">Age of Conflict</span>
                        <a href="https://store4.gofile.io/download/web/97ab2ddd-80a4-4a27-83fa-b7a7cb9e77b9/Age%20Of%20Conflict.7z" class="download-btn">Download</a>
                    </div>
                    <div class="card">
                        <span class="item-name" onclick="openSpecs('People Playground', 'Win 10', '2.0 GHz', '4GB', 'Integrated Graphics')">People Playground</span>
                        <a href="https://download.eu-central-1.fromsmash.co/transfer/SgRszVQ-q_-dt/file/deb4a37703d9c612cdb9b96e9376ba3a993cbc5d?identity=a09bc926792f0f6f8f45214dd5f8a43b-188d089f05bf9aa33c287619b8d30c3ea1936a2576897c15658ff2c446e5c9973f05c6e6c128d59c723f9f01cab5346fc92f45dc1021b97dc76d50150e029462dc48a740f3e4145397b9771236d03306&Expires=1772544404&Key-Pair-Id=APKAIM76HR2FWFZRN3HA&Signature=hURLx7oTPF9b-F6hpVYKXmG9BCJflAbfI4-IzauNQ2Wji1q8MHlZ5uu9r8z-YlFgP8Y5hzEO15VDyg8QwqAi~AG6xk6n-wM4Gwt81o1E-naELrXS9S7nS-hAyVvtsMBl6ZXJSXUT1mGRXIVzMUk6DCnF0Y5xp3HmmNdsSWvtnuBqHB9Jpsy1jJnyU8~cCs6bDfcPuhpFwRGG8gCedv9Q6ONuSois7JJhmJRDGRkkfgt2NW2jj9m-SrcVbiJ9iqtR7kIDDFsdqG~1IZeBabWhuyrzLi5yzI1qtASEVLdHJ0IE2Pr2hvVl3QcvFkjkm7Krpmph-oK3tWGjbOnHjyRYBg__" class="download-btn">Download</a>
                    </div>
                </div>
            </div>

            <div id="apps" class="content-section">
                <h1>App Downloads</h1>
                <div class="button-grid">
                    <div class="card">
                        <span class="item-name" onclick="openSpecs('Adobe Premiere Pro 2025', 'Windows 11 (64-bit)', 'Intel 6th Gen / AMD Ryzen 1000', '8GB (16GB recommended)', '2GB VRAM (4GB recommended)')">Adobe Premiere Pro 2025</span>
                        <a href="https://cold3.gofile.io/download/web/d1580a74-1afa-4681-bcd3-59cd2a3ad7cc/Premiere%20Pro%20NexService.zip" class="download-btn">Download</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="specModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: #ff8c00;">Minimum Specs</h2>
            <ul class="specs-list">
                <li><b>OS:</b> <span id="specOS"></span></li>
                <li><b>CPU:</b> <span id="specCPU"></span></li>
                <li><b>RAM:</b> <span id="specRAM"></span></li>
                <li><b>GPU:</b> <span id="specGPU"></span></li>
            </ul>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openSpecs(name, os, cpu, ram, gpu) {
            document.getElementById('modalTitle').innerText = name + " - Minimum Specs";
            document.getElementById('specOS').innerText = os;
            document.getElementById('specCPU').innerText = cpu;
            document.getElementById('specRAM').innerText = ram;
            document.getElementById('specGPU').innerText = gpu;
            document.getElementById('specModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('specModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('specModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexService</title>
    <style>
        /* Base design in Dark Mode */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header Layout */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            background-color: rgba(18, 18, 18, 0.95);
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .nav-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #ff8c00;
        }

        .discord-link {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.3s ease;
        }

        .brand {
            color: #ff8c00;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main content area */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* Motion Blur Animation */
        @keyframes motionBlurIn {
            0% {
                filter: blur(10px);
                transform: scale(0.95);
                opacity: 0;
            }
            100% {
                filter: blur(0);
                transform: scale(1);
                opacity: 1;
            }
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: motionBlurIn 0.4s ease-out;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1e1e1e;
            color: #ff8c00;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #ff8c00;
            color: #121212;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="https://discord.gg/C2r3TptZxE" class="discord-link" target="_blank">Discord</a>
            <button class="nav-btn active" onclick="showSection('games')">Games</button>
            <button class="nav-btn" onclick="showSection('apps')">Apps</button>
        </div>
        
        <div class="brand">NexService</div>
    </header>

    <main>
        <div class="container">
            
            <div id="games" class="content-section active">
                <h1>Game Downloads</h1>
                <div class="button-grid">
                    <a href="https://dl1.tlauncher.org/f.php?f=files%2FTLauncher-Installer-1.9.5.5.exe" class="download-btn">
                        Minecraft (TLauncher)
                    </a>
                    <a href="https://store4.gofile.io/download/web/97ab2ddd-80a4-4a27-83fa-b7a7cb9e77b9/Age%20Of%20Conflict.7z" class="download-btn">
                        Age of Conflict
                    </a>
                    <a href="https://store2.gofile.io/download/web/efe6cafc-6729-4872-9b45-212a5d1966ff/People%20Playground%20NexService.zip" class="download-btn">
                        People Playground
                    </a>
                </div>
            </div>

            <div id="apps" class="content-section">
                <h1>App Downloads</h1>
                <div class="button-grid">
                    <p style="color: #666; grid-column: 1/-1;">No apps added yet. Stay tuned!</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.content-section');
            const buttons = document.querySelectorAll('.nav-btn');

            sections.forEach(section => section.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>

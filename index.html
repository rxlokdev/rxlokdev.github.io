<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexService | Edit Resources</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #8b0000;
            --bg-black: #0a0a0a;
            --card-gray: #151515;
            --text-white: #eeeeee;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* Navigation / Header */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            background: linear-gradient(to bottom, #1a0000, var(--bg-black));
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Sponsored Button */
        .sponsor-btn {
            background-color: transparent;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .sponsor-btn span {
            color: #1DB954; /* Spotify-Grün als Akzent für Spotdown */
            font-weight: bold;
        }

        .sponsor-btn:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        /* Main Section */
        main {
            padding: 50px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            border-left: 5px solid var(--primary-red);
            padding-left: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Audio Card */
        .audio-card {
            background: var(--card-gray);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .audio-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-red);
        }

        .audio-info h3 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
        }

        .download-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-red);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s ease;
        }

        .download-link:hover {
            background-color: var(--dark-red);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">NexService</div>
        <a href="https://spotdown.org" class="sponsor-btn" target="_blank">
            Sponsored by <span>Spotdown</span>
        </a>
    </header>

    <main>
        <h2 class="section-title">Trending Songs & Sounds</h2>
        
        <div class="grid">
            <div class="audio-card">
                <div class="audio-info">
                    <h3>Scream for my ice cream</h3>
                    <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">Perfect for fast-paced edits / PHonk style</p>
                    <a href="https://store-eu-gra-1.gofile.io/download/web/92ac6523-416d-43d4-9c10-464e5bc22b0f/%F0%9D%94%85%F0%9D%94%AC%F0%9D%94%AC%F0%9D%94%A1%20%F0%9D%94%AC%F0%9D%94%AB%20%F0%9D%94%B1%F0%9D%94%A5%F0%9D%94%A2%20%F0%9D%94%A1%F0%9D%94%9E%F0%9D%94%AB%F0%9D%94%A0%F0%9D%94%A2%F0%9D%94%A3%F0%9D%94%A9%F0%9D%94%AC%F0%9D%94%AC%F0%9D%94%AF%F0%9D%94%96%F0%9D%94%A0%F0%9D%94%AF%F0%9D%94%A2%F0%9D%94%9E%F0%9D%94%AA%20%F0%9D%94%A3%F0%9D%94%AC%F0%9D%94%AF%20%F0%9D%94%AA%F0%9D%94%B6%20%F0%9D%94%A6%F0%9D%94%A0%F0%9D%94%A2%F0%9D%94%A0%F0%9D%94%AF%F0%9D%94%A2%F0%9D%94%9E%F0%9D%94%AA%20(%F0%9D%94%B0%F0%9D%94%A9%F0%9D%94%AC%F0%9D%94%B4%F0%9D%94%A2%F0%9D%94%A1%2B%F0%9D%94%AF%F0%9D%94%A2%F0%9D%94%B3%F0%9D%94%A2%F0%9D%94%AF%F0%9D%94%9F).mp3" class="download-link">
                        Download MP3
                    </a>
                </div>
            </div>

            <div class="audio-card" style="opacity: 0.5; border-style: dashed;">
                <div class="audio-info">
                    <h3>More coming soon...</h3>
                    <p>New sounds every week.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 NexService Edit Resources. All rights reserved.
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexService</title>
    <style>
        /* Base design in Dark Mode */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header for top-left and top-right positioning */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between; /* Spacing between left and right */
            align-items: center;
            box-sizing: border-box;
        }

        /* Discord Button Style */
        .discord-link {
            background-color: #5865F2; /* Discord Blurple */
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s ease;
        }

        .discord-link:hover {
            opacity: 0.8;
        }

        /* Branding in Orange */
        .brand {
            color: #ff8c00;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main content area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 10px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Style for the Game Button */
        .download-btn {
            display: inline-block;
            background-color: #ff8c00;
            color: #121212;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-size: 1.1rem;
        }

        .download-btn:hover {
            background-color: #e67e00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="https://discord.gg/C2r3TptZxE" class="discord-link" target="_blank">Discord</a>
        
        <div class="brand">NexService</div>
    </header>

    <main>
        <div class="container">
            <h1>Available Downloads</h1>
            <a href="https://store4.gofile.io/download/web/97ab2ddd-80a4-4a27-83fa-b7a7cb9e77b9/Age%20Of%20Conflict.7z" class="download-btn">
                Download Age of Conflict
            </a>
        </div>
    </main>

</body>
</html>
